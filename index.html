<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <title>Project-2</title>
</head>

<body>
  <!-- HEADER -->
  <header class="header-section py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <img src="logo.png" alt="logo" class="logo" width=20%>

      <nav class="menu d-flex gap-4 align-items-center">
        <a href="#">Home</a>
        <a href="#">Case study</a>
        <a href="#">About us</a>
        <a href="#">Careers</a>
        <a href="#">What we do</a>
        <a href="#">Contact</a>

        <div class="d-flex gap-2 align-items-center">
          <i class="fas fa-flag-usa"></i>
          <a class="lang" href="#">EN-US</a>
          <i class="fa fa-caret-down"></i>
        </div>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero mt-5">
    <div class="container">
      <div class="row align-items-center">

        <div class="col-auto d-flex flex-column align-items-center gap-4 vertical-box">
          <div class="top-text fs-5">W.</div>
          <div class="rotated-text fs-5">Nominee</div>
        </div>

        <div class="col">
          <h1 class="hero-heading">
            We design experiences that move businesses to the future.
          </h1>

          <div class="d-flex gap-4 mt-4">
            <a class="btn btn-outline-light" href="#">
              Play showreel <span class="arrow45">&#10138;</span>
            </a>

            <a class="btn btn-outline-light" href="#">About US</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- HANDS + VIDEO -->
  <section class="hands-section">
    <div class="container-fluid px-0">
      <div class="d-flex justify-content-between align-items-center">

        <img src="lefthand.png" class="hand-img">

        <iframe width="650" height="365" class="video-frame"
          src="https://www.youtube.com/embed/c5YdpZjW-dc" allowfullscreen></iframe>

        <img src="righthand.png" class="hand-img right-hand">
      </div>
    </div>
  </section>

  <!-- LOGOS -->
  <section class="logos py-5">
    <div class="container">
      <div class="row text-center g-4">

        <div class="col-4 col-md-2"><img src="2.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="2.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="3.png" class="logo-img"></div>

        <div class="col-4 col-md-2"><img src="4.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="5.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="6.png" class="logo-img"></div>

        <div class="col-4 col-md-2"><img src="7.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="8.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="9.png" class="logo-img"></div>

        <div class="col-4 col-md-2"><img src="10.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="11.png" class="logo-img"></div>
        <div class="col-4 col-md-2"><img src="12.png" class="logo-img"></div>

      </div>
    </div>
